<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoPSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body data-theme="obsidian" translate="no">
  <div id="app">
    <!-- HUD Layer -->
    <header class="hud-layer">
      <div class="logo">NeoPSE</div>
      <div class="project-info">Proyecto: MiPrimerAlgoritmo.pse</div>
      <div class="actions" style="display: flex; gap: 8px;">
        <button id="recenter-btn" class="btn-secondary" title="Centrar Vista">🏠</button>
        <button id="theme-toggle" class="btn-secondary">Tema</button>
        <button id="debug-ai-btn" class="btn-secondary" title="Depurador de IA">🐞</button>
        <button id="run-btn" class="btn-primary">Ejecutar</button>
      </div>
    </header>

    <!-- Asistente IA (Fijo en Interfaz) -->
    <aside id="assistant-panel" class="hud-layer assistant-sidebar">
      <div class="block-header">
        <span class="block-title">Asistente IA</span>
      </div>
      <div class="block-content chat-block">
        <div class="chat-messages">
          <div class="message ai">Hola. Soy tu asistente de NeoPSE. ¿En qué puedo ayudarte hoy?</div>
        </div>
        <div class="chat-input-area">
          <input type="text" placeholder="Pregunta algo..." class="chat-input">
        </div>
      </div>
    </aside>

    <!-- World Layer -->
    <main id="board" class="board">
      <div id="canvas-container">
        <svg id="relationship-layer">
          <!-- Enlaces dinámicos -->
        </svg>
        <div id="canvas" class="canvas">
          <!-- Bloques dinámicos -->
        </div>
      </div>
    </main>
    <!-- Modal Depurador de IA -->
    <div id="ai-debugger-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px;">
      <div style="background: #1e1e1e; color: #fff; width: 80%; height: 80%; border-radius: 8px; border: 1px solid var(--accent-color); padding: 20px; display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
          <h2 style="margin: 0; display: flex; align-items: center; gap: 8px;">🐞 Depurador de Contexto IA</h2>
          <button id="close-debugger-btn" style="background: transparent; border: none; color: #fff; font-size: 1.5rem; cursor: pointer;">✕</button>
        </div>
        <div style="flex: 1; overflow-y: auto; padding-top: 15px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; white-space: pre-wrap;">
          <div id="debug-content">No hay datos de depuración cargados. Haz clic en actualizar.</div>
        </div>
        <div style="padding-top: 10px; text-align: right;">
          <button id="refresh-debugger-btn" class="btn-primary" style="padding: 8px 16px;">Actualizar Datos</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
