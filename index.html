<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoPSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body data-theme="obsidian">
  <div id="app">
    <!-- HUD Layer -->
    <header class="hud-layer">
      <div class="logo">NeoPSE</div>
      <div class="project-info">Proyecto: MiPrimerAlgoritmo.pse</div>
      <div class="actions" style="display: flex; gap: 8px;">
        <button id="add-pseudo" class="btn-secondary" title="Nuevo Pseudocódigo">+ Código</button>
        <button id="add-note" class="btn-secondary" title="Nueva Nota">+ Nota</button>
        <button id="recenter-btn" class="btn-secondary" title="Centrar Vista">🏠</button>
        <button id="theme-toggle" class="btn-secondary">Tema</button>
        <button id="run-btn" class="btn-primary">Ejecutar</button>
      </div>
    </header>

    <!-- Asistente IA (Fijo en Interfaz) -->
    <aside id="assistant-panel" class="hud-layer assistant-sidebar">
      <div class="block-header">
        <span class="block-title">Asistente IA</span>
      </div>
      <div class="block-content chat-block">
        <div class="chat-messages">
          <div class="message ai">Hola. Soy tu asistente de NeoPSE. ¿En qué puedo ayudarte hoy?</div>
        </div>
        <div class="chat-input-area">
          <input type="text" placeholder="Pregunta algo..." class="chat-input">
        </div>
      </div>
    </aside>

    <!-- World Layer -->
    <main id="board" class="board">
      <div id="canvas-container">
        <svg id="relationship-layer">
          <!-- Enlaces dinámicos -->
        </svg>
        <div id="canvas" class="canvas">
          <!-- Bloques dinámicos -->
        </div>
      </div>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
